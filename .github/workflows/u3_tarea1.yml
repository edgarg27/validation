name: u3_tarea1

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: bash setup.sh

      - name: Run lint
        run: make lint

      - name: Run build
        run: make build

      - name: Run unit tests
        run: make unit-tests

      - name: Run validate
        run: make validate

      - name: Run integration tests
        run: make integration-tests
