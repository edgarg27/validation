name: u3_tarea3

on:
  push:
    branches:
      - main
    tags:
      - '*'
  schedule:
    - cron: '0 0 * * *'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: bash setup.sh

      - name: Run lint
        run: make lint

      - name: Run build
        run: make build

      - name: Run unit tests
        run: make unit-tests

      - name: Run validate
        run: make validate

      - name: Run integration tests
        run: make integration-tests

      - name: Package application
        run: make package

      - name: Upload Artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: awesome-website
          path: awesome-website.zip

      # NUEVO: Crear un GitHub Release SOLO si se empujó un Tag
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: awesome-website.zip
          body_path: DEPLOY.md
